name: Validate Patches

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run weekly to catch upstream ESO breakage early
  schedule:
    - cron: '0 8 * * 1'

jobs:
  validate-patches:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        eso-version: ['v2.1.0']
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Clone ESO at ${{ matrix.eso-version }}
        run: |
          git clone --depth 1 --branch ${{ matrix.eso-version }} \
            https://github.com/external-secrets/external-secrets.git eso

      - name: Apply patches
        working-directory: eso
        run: |
          git am ../eso-patches/*.patch

      - name: Verify go.mod is tidy
        working-directory: eso
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
